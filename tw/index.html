<body>
	<div class="container">
		<header class="header">
			<h1>百年藏曆</h1>
			<div class="selected-day" id="selectedDay"></div>
		</header>

		<div class="controls">
			<button type="button" onclick="changeYear(-1)" class="nav-btn prev-year" aria-label="上一年"><span>◀ 上一年</span></button>
			<button type="button" onclick="changeMonth(-1)" class="nav-btn prev-month" aria-label="上一月"><span>◀ 上一月</span></button>
			<button type="button" onclick="goToToday()" class="nav-btn today-btn" aria-label="今天">📅 今天</button>
			<button type="button" onclick="changeMonth(1)" class="nav-btn next-month" aria-label="下一月"><span>下一月 ▶</span></button>
			<button type="button" onclick="changeYear(1)" class="nav-btn next-year" aria-label="下一年"><span>下一年 ▶</span></button>
			<select id="year" onchange="changeDate('year')" aria-label="年份" hidden></select>
			<select id="month" onchange="changeDate('month')" aria-label="月份" hidden></select>
		</div>

		<div class="calendar-container">
			<table class="calendar-table">
				<tbody>
					<tr>
						<th scope="col">週日</th>
						<th scope="col">週一</th>
						<th scope="col">週二</th>
						<th scope="col">週三</th>
						<th scope="col">週四</th>
						<th scope="col">週五</th>
						<th scope="col">週六</th>
					</tr>
				</tbody>
			</table>
		</div>

		<div class="selected-day-bottom" id="selectedDayBottom"></div>

		<section class="info-section">
			<h3>📚 資料來源</h3>
			<p>• 藏曆資料來源於《藏曆、公曆、農曆對照百年曆書（1951-2050）》</p>
			<p>• 日月食資料來自NASA，並從UTC時間轉換到北京時間計算日期</p>
			<p>• 由於地球上不同位置看到的初虧復圓時間會不同，時間可能存在誤差</p>
		</section>

		<section class="info-section">
			<h3>🔗 開源資訊</h3>
			<p>本頁面和資料開源於 <a href="https://github.com/stonelf/zangli" target="_blank" rel="noopener noreferrer" style="color: var(--primary-color); text-decoration: none;">GitHub</a>，歡迎下載使用。</p>
		</section>

		<noscript>
			<div class="info-section">
				<p>此日曆需要啟用 JavaScript 才能查詢。</p>
			</div>
		</noscript>
	</div>

	<div id="detailMask" aria-hidden="true"></div>
	<div id="detailDialog" aria-modal="true" aria-hidden="true" role="dialog" tabindex="-1" aria-labelledby="detailTitle" aria-describedby="detailContent">
		<div class="dialog-header">
			<button type="button" class="share-btn" onclick="shareDate()" aria-label="分享日期">分享</button>
			<button type="button" class="close-btn" onclick="closeDetail()" aria-label="關閉彈窗">×</button>
		</div>
		<div id="detailContent"></div>
		<div class="dialog-footer">
			<button type="button" class="copy-btn" onclick="copyDateInfo()" aria-label="複製日期資訊 (Ctrl+C)">📋 複製資訊</button>
		</div>
	</div>
